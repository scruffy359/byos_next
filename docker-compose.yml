services:
  postgres:
    image: postgres:16-alpine
    container_name: byos_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=byos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - byos_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  keyvalue:
    image: valkey/valkey:9-alpine
    container_name: byos_keyvalue
    ports:
      - "${KEYVALUE_PORT}:${KEYVALUE_PORT}"
    command: >
      valkey-server
      --requirepass ${KEYVALUE_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --port ${KEYVALUE_PORT}
    restart: unless-stopped
    volumes:
      - keyvalue-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p ${KEYVALUE_PORT} ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 2s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - byos_network

  byos-next:
    # image: ghcr.io/usetrmnl/byos_next:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/byos_db?sslmode=disable
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - byos_network

volumes:
  postgres_data:
    driver: local
  keyvalue-data:

networks:
  byos_network:
    driver: bridge
